<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Bubble Blitz</title>
    <!-- Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-TPL4VJZQDF"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-TPL4VJZQDF");
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        touch-action: none;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: var(--bg);
        font-family: var(--font);
        color: var(--text);
        user-select: none;
      }
      body.minimal {
        --bg: #e8e8e8;
        --text: #333;
        --font: "Helvetica Neue", sans-serif;
        --border: #bbb;
      }
      body.retro {
        --bg: #06060e;
        --text: #00ff41;
        --font: "Courier New", monospace;
        --border: #00ff41;
      }
      body.chaotic {
        --bg: #0a001a;
        --text: #fff;
        --font: "Arial Black", sans-serif;
        --border: #ff00ff;
      }

      #topbar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 8px 12px;
        flex-shrink: 0;
        padding-top: max(8px, env(safe-area-inset-top));
      }
      .theme-btn {
        background: none;
        border: 1px solid var(--text);
        color: var(--text);
        padding: 8px 14px;
        cursor: pointer;
        font-family: var(--font);
        font-size: 0.7rem;
        border-radius: 6px;
        opacity: 0.45;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        min-height: 40px;
        flex: 1;
        max-width: 110px;
        transition:
          opacity 0.15s,
          background 0.15s,
          color 0.15s;
      }
      .theme-btn:hover {
        opacity: 0.75;
      }
      .theme-btn:active {
        opacity: 1;
      }
      .theme-btn.active {
        opacity: 1;
        background: var(--text);
        color: var(--bg);
      }

      #canvas-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 0;
      }
      canvas {
        display: block;
        touch-action: none;
        border: 1.5px solid var(--border);
      }
      body.retro canvas {
        box-shadow: 0 0 24px rgba(0, 255, 65, 0.2);
      }
      body.chaotic canvas {
        box-shadow: 0 0 32px rgba(255, 0, 255, 0.25);
      }

      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.84);
        z-index: 20;
      }
      #overlay h1 {
        font-size: 2.6rem;
        margin-bottom: 8px;
        font-family: var(--font);
        color: var(--text);
      }
      #overlay .sub {
        font-size: 0.95rem;
        margin-bottom: 6px;
        opacity: 0.65;
        font-family: var(--font);
        color: var(--text);
      }
      #overlay .hs {
        font-size: 0.85rem;
        margin-bottom: 28px;
        opacity: 0.4;
        font-family: var(--font);
        color: var(--text);
      }
      #overlay button {
        font-size: 1.1rem;
        padding: 14px 40px;
        border: 2px solid white;
        background: none;
        color: white;
        cursor: pointer;
        font-family: var(--font);
        border-radius: 8px;
        margin-bottom: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        min-width: 180px;
        transition:
          background 0.15s,
          color 0.15s;
      }
      #overlay button:hover,
      #overlay button:active {
        background: white;
        color: #111;
      }
      #overlay .hint {
        font-size: 0.75rem;
        opacity: 0.3;
        font-family: var(--font);
        color: var(--text);
      }
      #overlay.hidden {
        display: none;
      }
    </style>
  </head>
  <body class="minimal">
    <div id="topbar">
      <button class="theme-btn active" data-theme="minimal">Minimal</button>
      <button class="theme-btn" data-theme="retro">Retro</button>
      <button class="theme-btn" data-theme="chaotic">Chaos</button>
    </div>
    <div id="canvas-wrap"><canvas id="c"></canvas></div>
    <div id="overlay">
      <h1 id="o-title">Bubble Blitz</h1>
      <p class="sub" id="o-sub">Match 3+ of the same color</p>
      <p class="hs" id="o-hs">Best: 0</p>
      <button id="startBtn">Play</button>
      <p class="hint">Drag to aim · Release to shoot</p>
    </div>
    <script src="game.js"></script>
  </body>
</html>
